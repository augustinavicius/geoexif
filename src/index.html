<!DOCTYPE html>

<head>
    <!--GEOEXIF (app version number)-->
    <title id="title"></title>
    <!--Script Execution Policy-->
    <meta http-equiv="Content-Security-Policy" content="script-src 'self';">
    <!--App Icon-->
    <link rel="icon" type="image/x-icon" href="./images/icon.ico">
    <!--Custom CSS-->
    <link rel="stylesheet" href="./styles/custom.css">
    <!--Bulma CSS-->
    <link rel="stylesheet" href="./styles/bulma.css">
    <!--Leaflet CSS-->
    <link rel="stylesheet" href="./styles/leaflet.css" />
    <!--Font Awesome Icons CSS-->
    <link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" />
    <!--Renderer JS-->
    <script src="./scripts/renderer.js"></script>
</head>

<body>
    <!--Auto Update Status Footer-->
    <div id="footer" class="ml-2"></div>
    <!--Main Menu View-->
    <div class="columns is-gapless">
        <!--Photo List-->
        <div class="column is-one-third">
            <div class="list has-overflow-ellipsis has-visible-pointer-controls">
                <div class="list-item">
                    <div class="list-item-content">
                        <div class="list-item-title">Photo name</div>
                        <!--Cia daryti masyva-->
                        <div class="list-item-description">Photo location</div>
                    </div>
                    <div class="list-item-controls">
                        <div class="buttons is-right">
                            <button class="button">
                                <span class="icon is-small">
                                    <i class="fas fa-edit"></i>
                                </span>
                                <span onclick="openImage(imageId)">Open</span>
                            </button>

                            <button class="button">
                                <span class="icon is-small">
                                    <i class="fas fa-ellipsis-h"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!--Map View-->
        <div class="column" id="map"></div>
    </div>
</body>
